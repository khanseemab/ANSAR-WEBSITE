<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace('/?p=' + encodeURIComponent(path + search + hash));
    </script>
  </head>
  <body></body>
</html>
